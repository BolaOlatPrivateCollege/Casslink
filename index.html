<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BOPC Staff CA Portal</title>
<style>
body{font-family:Arial;padding:20px;background:#f4f7f6;}
.container{max-width:1100px;margin:auto;background:#fff;padding:20px;border-radius:10px;}
.hidden{display:none;}
table{width:100%;border-collapse:collapse;}
th{background:#0d47a1;color:#fff;padding:10px;}
td{border:1px solid #ddd;padding:8px;text-align:center;}
input[type=number]{width:60px;}
.pill{padding:10px;background:#e3f2fd;margin-bottom:10px;}
</style>
</head>

<body>

<div class="container">

<div id="authSection">
<h2>Teacher Login</h2>
<input type="password" id="staffPin">
<button onclick="verifyAccess()">Login</button>
</div>

<div id="mainPortal" class="hidden">

<div class="pill">
Subject: <span id="subjectLabel"></span>
</div>

<select id="classSelect"></select>

<table>
<thead>
<tr>
<th>Name</th>
<th>T1</th>
<th>T2</th>
<th>Ext.Cur</th>
<th>Class Int</th>
<th>Note</th>
<th>Total</th>
</tr>
</thead>
<tbody id="studentTableBody"></tbody>
</table>

</div>
</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz2zNCt7yvHaDr070_5iMA8mJo2l3WrWyCQNSx3fFUxXe-Zrgiv6Z8NToYdET-N1eguWA/exec";

let activeStaff="";
let allowedArm="";

const studentDatabase={
"Basic 7":[{n:"STUDENT ONE",c:"BOC001"}]
};

/* LOGIN */
async function verifyAccess(){

const pin=document.getElementById("staffPin").value;

const res=await fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
action:"login",
pin
})
});

const data=await res.json();

if(!data.ok){
alert("Invalid PIN");
return;
}

activeStaff=data.subject;
allowedArm=data.arm;

document.getElementById("authSection").classList.add("hidden");
document.getElementById("mainPortal").classList.remove("hidden");
document.getElementById("subjectLabel").textContent=activeStaff;

loadClasses();
}

/* LOAD CLASSES */
function loadClasses(){

const sel=document.getElementById("classSelect");

sel.innerHTML="";

["Basic 7","Basic 8","Basic 9","Senior 1","Senior 2","Senior 3"]
.forEach(c=>{
const o=document.createElement("option");
o.value=c;o.textContent=c;
sel.appendChild(o);
});

sel.addEventListener("change",loadStudents);
}

/* BUILD ROW */
function buildRow(s){

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${s.n}</td>
<td><input class="t1" type="number" min="0" max="10"></td>
<td><input class="t2" type="number" min="0" max="10"></td>
<td><input class="extcur" type="number" min="0" max="5"></td>
<td><input class="classint" type="number" min="0" max="5"></td>
<td><input class="note" type="number" min="0" max="10"></td>
<td class="row-total">0</td>
`;

tr.querySelectorAll("input").forEach(inp=>{
inp.addEventListener("input",()=>processRow(tr,s));
});

return tr;
}

/* PROCESS */
function processRow(tr,s){

const t1=Number(tr.querySelector(".t1").value)||0;
const t2=Number(tr.querySelector(".t2").value)||0;
const ext=Number(tr.querySelector(".extcur").value)||0;
const cls=Number(tr.querySelector(".classint").value)||0;
const note=Number(tr.querySelector(".note").value)||0;

const total=t1+t2+ext+cls+note;

tr.querySelector(".row-total").textContent=total.toFixed(1);

syncScore(s,total,t1,t2,ext,cls,note);
}

/* SAVE */
async function syncScore(s,total,t1,t2,extcur,classint,note){

await fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
action:"save",
className:document.getElementById("classSelect").value,
subject:activeStaff,
code:s.c,
t1,t2,extcur,classint,note,total
})
});

}

/* LOAD STUDENTS */
function loadStudents(){

const cls=document.getElementById("classSelect").value;
const body=document.getElementById("studentTableBody");

body.innerHTML="";

(studentDatabase[cls]||[])
.forEach(s=>body.appendChild(buildRow(s)));

}

</script>

</body>
</html>
