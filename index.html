<style>

:root{
  --blue:#0d47a1;
  --gold:#fbc02d;
  --light:#f5f7fb;
}

body{
  font-family:"Segoe UI",sans-serif;
  background:var(--light);
  margin:0;
  padding:20px;
}

.container{
  max-width:1200px;
  margin:auto;
  background:#fff;
  padding:25px;
  border-radius:14px;
  box-shadow:0 8px 25px rgba(0,0,0,.08);
}

h1{
  margin:0;
  color:var(--blue);
  text-align:center;
}

.hidden{display:none;}

.login-box{
  max-width:400px;
  margin:60px auto;
  padding:30px;
  background:#fff;
  border-radius:12px;
  box-shadow:0 6px 20px rgba(0,0,0,.1);
  text-align:center;
}

button{
  background:var(--blue);
  color:#fff;
  border:none;
  padding:12px;
  border-radius:8px;
  font-weight:700;
  width:100%;
  cursor:pointer;
}

.topbar{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  margin:20px 0;
}

.card{
  background:#f9fafc;
  border:1px solid #ddd;
  border-radius:10px;
  padding:12px;
}

select,input{
  width:100%;
  padding:10px;
  border:1px solid #ccc;
  border-radius:8px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}

th{
  background:var(--blue);
  color:#fff;
  padding:12px;
  font-size:13px;
}

td{
  border:1px solid #eee;
  padding:8px;
  text-align:center;
}

tr:nth-child(even){background:#fafafa;}

input[type=number]{
  width:65px;
  text-align:center;
  font-weight:700;
}

.row-total{
  font-weight:900;
  color:var(--blue);
}

</style>
</head>

/* ===========================
   LOGIN
=========================== */

async function verifyAccess(){

const pin=document.getElementById("staffPin").value.trim();

const res=await fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
action:"login",
pin
})
});

const data=await res.json();

if(!data.ok){
alert("Invalid PIN");
return;
}

activeStaff=data.subject;
allowedArm=data.arm;

document.getElementById("authSection").classList.add("hidden");
document.getElementById("mainPortal").classList.remove("hidden");

document.getElementById("subjectLabel").textContent=activeStaff;

loadClasses();
}

/* ===========================
   CLASS LOADER (CORRECT)
=========================== */

function loadClasses(){

const sel=document.getElementById("classSelect");
sel.innerHTML="";

let classes=[];

if(allowedArm==="Junior"){
classes=["Basic 7","Basic 8","Basic 9"];
}

if(allowedArm==="Senior"){
classes=["Senior 1","Senior 2","Senior 3"];
}

if(allowedArm==="Master"){
classes=[
"Basic 7","Basic 8","Basic 9",
"Senior 1","Senior 2","Senior 3"
];
}

const first=document.createElement("option");
first.value="";
first.textContent="-- Select Class --";
sel.appendChild(first);

classes.forEach(c=>{
const o=document.createElement("option");
o.value=c;
o.textContent=c;
sel.appendChild(o);
});

sel.addEventListener("change",loadStudents);
}

/* ===========================
   BUILD ROW
=========================== */

function buildRow(s){

const tr=document.createElement("tr");

tr.innerHTML=`
<td style="text-align:left">${s.n}</td>
<td><input class="t1" type="number" min="0" max="10"></td>
<td><input class="t2" type="number" min="0" max="10"></td>
<td><input class="extcur" type="number" min="0" max="5"></td>
<td><input class="classint" type="number" min="0" max="5"></td>
<td><input class="note" type="number" min="0" max="10"></td>
<td class="row-total">0</td>
`;

tr.querySelectorAll("input").forEach(inp=>{
inp.addEventListener("input",()=>processRow(tr,s));
});

return tr;
}

/* ===========================
   PROCESS SCORE
=========================== */

function processRow(tr,s){

const t1=Number(tr.querySelector(".t1").value)||0;
const t2=Number(tr.querySelector(".t2").value)||0;
const ext=Number(tr.querySelector(".extcur").value)||0;
const cls=Number(tr.querySelector(".classint").value)||0;
const note=Number(tr.querySelector(".note").value)||0;

const total=t1+t2+ext+cls+note;

tr.querySelector(".row-total").textContent=total.toFixed(1);

syncScore(s,total,t1,t2,ext,cls,note);
}

/* ===========================
   SAVE TO CLOUD
=========================== */

async function syncScore(s,total,t1,t2,extcur,classint,note){

await fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
action:"save",
className:document.getElementById("classSelect").value,
subject:activeStaff,
code:s.c,
t1,t2,extcur,classint,note,total
})
});

}

/* ===========================
   LOAD STUDENTS
=========================== */

function loadStudents(){

const cls=document.getElementById("classSelect").value;
const body=document.getElementById("studentTableBody");

body.innerHTML="";

(studentDatabase[cls]||[])
.forEach(s=>body.appendChild(buildRow(s)));

}
