<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BOPC Staff CA Portal</title>

<style>
:root{
  --blue:#0d47a1;
  --light:#f5f7fb;
}
body{
  font-family:"Segoe UI",sans-serif;
  background:var(--light);
  margin:0;
  padding:20px;
}
.container{
  max-width:1200px;
  margin:auto;
  background:#fff;
  padding:25px;
  border-radius:14px;
  box-shadow:0 8px 25px rgba(0,0,0,.08);
}
h1{margin:0;color:var(--blue);text-align:center;}
.hidden{display:none;}

.login-box{
  max-width:400px;
  margin:60px auto;
  padding:30px;
  background:#fff;
  border-radius:12px;
  box-shadow:0 6px 20px rgba(0,0,0,.1);
  text-align:center;
}

button{
  background:var(--blue);
  color:#fff;
  border:none;
  padding:12px;
  border-radius:8px;
  font-weight:700;
  cursor:pointer;
  width:100%;
}

.topbar{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  margin:20px 0;
}

.card{
  background:#f9fafc;
  border:1px solid #ddd;
  border-radius:10px;
  padding:12px;
}

select,input{
  width:100%;
  padding:10px;
  border:1px solid #ccc;
  border-radius:8px;
}

table{
  width:100%;
  border-collapse:collapse;
}
th{
  background:#0d47a1;
  color:#fff;
  padding:10px;
}
td{
  border:1px solid #eee;
  padding:8px;
  text-align:center;
}
input[type=number]{width:65px;text-align:center;}
.row-total{font-weight:900;color:#0d47a1;}
</style>
</head>

<body>

<div class="container">

<h1>BOLA OLAT PRIVATE COLLEGE</h1>

<button id="logoutBtn" class="hidden"
style="max-width:120px;background:#d32f2f;margin:10px 0;"
onclick="logout()">LOGOUT</button>

<!-- LOGIN -->
<div id="authSection" class="login-box">
<h2>Teacher Login</h2>
<input type="password" id="staffPin" placeholder="Enter PIN">
<br><br>
<button onclick="verifyAccess()">ACCESS MY CLASSES</button>
</div>

<!-- MAIN -->
<div id="mainPortal" class="hidden">

<div class="topbar">

<div class="card">
Logged in as:<br>
<b id="subjectLabel"></b>
</div>

<div class="card">
<select id="classSelect"></select>
</div>

<div class="card">
Data Sync:<br>
<b id="syncStatus">Ready</b>
</div>

</div>

<table>
<thead>
<tr>
<th style="text-align:left">Student</th>
<th>T1 (10)</th>
<th>T2 (10)</th>
<th>Ext.Cur (5)</th>
<th>Class Int (5)</th>
<th>Note (10)</th>
<th>Total (40)</th>
</tr>
</thead>
<tbody id="studentTableBody"></tbody>
</table>

</div>
</div>

<script>

/* CONFIG */
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbwkz2b7tMZyOgvq-Y3sBjFWK8MNxFMLYfpEHyLEo0wGWUV1Yd1mJOt48tPO9hmt7GGSng/exec";

let activeStaff="";
let allowedArm="";

/* STUDENTS (keep your full list here) */
const studentDatabase = { /* YOUR FULL DATA */ };

/* ---------- HELPERS ---------- */

function setSync(text,color){
const el=document.getElementById("syncStatus");
el.textContent=text;
el.style.color=color;
}

function logout(){ location.reload(); }

/* ---------- LOGIN ---------- */

async function verifyAccess(){

const pin=document.getElementById("staffPin").value.trim();

const res=await fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({action:"login",pin})
});

const data=await res.json();

if(!data.ok){
alert("Invalid PIN");
return;
}

activeStaff=data.subject;
allowedArm=data.arm;

document.getElementById("authSection").classList.add("hidden");
document.getElementById("mainPortal").classList.remove("hidden");
document.getElementById("logoutBtn").classList.remove("hidden");

document.getElementById("subjectLabel").textContent=activeStaff;

loadClasses();
}

/* ---------- CLASS LOADER ---------- */

function loadClasses(){

const sel=document.getElementById("classSelect");
sel.innerHTML="";

let classes=[];

if(allowedArm==="Junior") classes=["Basic 7","Basic 8","Basic 9"];
if(allowedArm==="Senior") classes=["Senior 1","Senior 2","Senior 3"];
if(allowedArm==="Master")
classes=["Basic 7","Basic 8","Basic 9","Senior 1","Senior 2","Senior 3"];

const first=document.createElement("option");
first.value="";
first.textContent="-- Select Class --";
sel.appendChild(first);

classes.forEach(c=>{
const o=document.createElement("option");
o.value=c;
o.textContent=c;
sel.appendChild(o);
});

sel.addEventListener("change",loadStudents);
}

/* ---------- VALIDATION ---------- */

function validateRow(tr){

const limits={t1:10,t2:10,extcur:5,classint:5,note:10};
let valid=true;

Object.keys(limits).forEach(k=>{
const inp=tr.querySelector("."+k);
const val=Number(inp.value);

if(val<0 || val>limits[k]){
inp.style.border="2px solid red";
valid=false;
}else{
inp.style.border="1px solid #ccc";
}
});

return valid;
}

/* ---------- BUILD ROW ---------- */

function buildRow(s){

const tr=document.createElement("tr");
tr.dataset.code=s.c;

tr.innerHTML=`
<td style="text-align:left">${s.n}</td>
<td><input class="t1" type="number" min="0" max="10"></td>
<td><input class="t2" type="number" min="0" max="10"></td>
<td><input class="extcur" type="number" min="0" max="5"></td>
<td><input class="classint" type="number" min="0" max="5"></td>
<td><input class="note" type="number" min="0" max="10"></td>
<td class="row-total">0</td>
`;

tr.querySelectorAll("input").forEach(inp=>{
inp.addEventListener("input",()=>processRow(tr,s));
});

return tr;
}

/* ---------- PROCESS SCORE ---------- */

function processRow(tr,s){

if(!validateRow(tr)){
tr.querySelector(".row-total").textContent="ERR";
return;
}

const t1=Number(tr.querySelector(".t1").value)||0;
const t2=Number(tr.querySelector(".t2").value)||0;
const ext=Number(tr.querySelector(".extcur").value)||0;
const cls=Number(tr.querySelector(".classint").value)||0;
const note=Number(tr.querySelector(".note").value)||0;

const total=t1+t2+ext+cls+note;
tr.querySelector(".row-total").textContent=total.toFixed(1);

syncScore(s,total,t1,t2,ext,cls,note);
}

/* ---------- SAVE ---------- */

async function syncScore(s,total,t1,t2,extcur,classint,note){

try{
setSync("Saving...","#f57c00");

await fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
action:"save",
className:document.getElementById("classSelect").value,
subject:activeStaff,
code:s.c,
t1,t2,extcur,classint,note,total
})
});

setSync("Saved","#2e7d32");

}catch{
setSync("Error","#d32f2f");
}
}

/* ---------- FETCH SCORES ---------- */

async function fetchScoresAndFill(className){

const res=await fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
action:"fetch",
className,
subject:activeStaff
})
});

const data=await res.json();
if(!data.ok) return;

document.querySelectorAll("#studentTableBody tr")
.forEach(tr=>{
const code=tr.dataset.code;
const r=data.records[code];
if(!r) return;

tr.querySelector(".t1").value=r.t1;
tr.querySelector(".t2").value=r.t2;
tr.querySelector(".extcur").value=r.extcur;
tr.querySelector(".classint").value=r.classint;
tr.querySelector(".note").value=r.note;
tr.querySelector(".row-total").textContent=
Number(r.total).toFixed(1);
});
}

/* ---------- LOAD STUDENTS ---------- */

async function loadStudents(){

const cls=document.getElementById("classSelect").value;
const body=document.getElementById("studentTableBody");

body.innerHTML="";

(studentDatabase[cls]||[])
.forEach(s=>body.appendChild(buildRow(s)));

await fetchScoresAndFill(cls);
}

</script>

</body>
</html>
