/* ================= HELPERS ================= */

function splitName(full){
const p=full.trim().split(" ");
return {first:p.shift()||"",last:p.join(" ")};
}

function setRowStatus(tr,t,c){
const s=tr.querySelector(".row-status");
s.textContent=t;s.style.color=c;
}

function validateRow(tr){
let valid=true;
for(const k in SCORE_LIMITS){
const i=tr.querySelector("."+k);
const v=+i.value||0;
if(v<0||v>SCORE_LIMITS[k]){
i.classList.add("invalid");
i.title="Max "+SCORE_LIMITS[k];
valid=false;
}else{
i.classList.remove("invalid");
i.title="";
}}
return valid;
}

/* ================= LOGIN ================= */

async function verifyAccess(){

try{

const pin=document.getElementById("staffPin").value.trim();

const r=await fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({action:"login",pin})
});

const d=await r.json();

if(!d.ok){alert("Invalid PIN");return;}

TOKEN=d.token;
activeStaff=d.subject;
allowedArm=d.arm;

document.getElementById("authSection").classList.add("hidden");
document.getElementById("logoutBtn").classList.remove("hidden");

if(allowedArm==="Master"){
document.getElementById("principalPortal").classList.remove("hidden");
loadPrincipalSelectors();
return;
}

document.getElementById("teacherPortal").classList.remove("hidden");
document.getElementById("subjectLabel").textContent=activeStaff;

loadClasses();

}catch(e){
alert("Connection error");
}
}

/* ================= TEACHER ================= */

function loadClasses(){

const sel=document.getElementById("classSelect");
sel.innerHTML="";

let c=[];
if(allowedArm==="Junior") c=["Basic 7","Basic 8","Basic 9"];
if(allowedArm==="Senior") c=["Senior 1","Senior 2","Senior 3"];

c.forEach(x=>{
const o=document.createElement("option");
o.value=x;o.textContent=x;
sel.appendChild(o);
});

sel.onchange=loadStudents;
sel.selectedIndex=0;
loadStudents();
}

async function fetchExisting(className){

const r=await fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
action:"fetch",
token:TOKEN,
className,
subject:activeStaff
})
});

const d=await r.json();
return d.records||{};
}

function buildRow(student,saved){

const n=splitName(student.n);
const tr=document.createElement("tr");

tr.innerHTML=`
<td style="text-align:left"><b>${student.n}</b><br><small>ID:${student.c}</small>
<input type=hidden class=h-fname value="${n.first}">
<input type=hidden class=h-lname value="${n.last}">
<input type=hidden class=h-code value="${student.c}">
</td>
<td><input type=number class=t1></td>
<td><input type=number class=t2></td>
<td><input type=number class=extcur></td>
<td><input type=number class=classint></td>
<td><input type=number class=note></td>
<td><div class="row-total total-box">0.0</div></td>
<td class=row-status>Ready</td>`;

if(saved){
tr.querySelector(".t1").value=saved.t1||0;
tr.querySelector(".t2").value=saved.t2||0;
tr.querySelector(".extcur").value=saved.extcur||0;
tr.querySelector(".classint").value=saved.classint||0;
tr.querySelector(".note").value=saved.note||0;
}

let editing=false;

tr.querySelectorAll("input[type=number]").forEach(inp=>{

inp.onfocus=()=>{editing=true;setRowStatus(tr,"Editing","#1565c0");};

inp.oninput=()=>{
updateTotal(tr);
if(!validateRow(tr)) setRowStatus(tr,"Error","#d32f2f");
};

inp.onblur=()=>setTimeout(async()=>{
if(!tr.contains(document.activeElement)&&editing){
editing=false;
if(!validateRow(tr)){setRowStatus(tr,"Error","#d32f2f");return;}
await saveRow(tr);
}},120);
});

updateTotal(tr);
return tr;
}

function updateTotal(tr){
const t1=+tr.querySelector(".t1").value||0;
const t2=+tr.querySelector(".t2").value||0;
const e=+tr.querySelector(".extcur").value||0;
const c=+tr.querySelector(".classint").value||0;
const n=+tr.querySelector(".note").value||0;
tr.querySelector(".row-total").textContent=(t1+t2+e+c+n).toFixed(1);
}

async function saveRow(tr){

setRowStatus(tr,"Saving","#f57c00");

const t1=+tr.querySelector(".t1").value||0;
const t2=+tr.querySelector(".t2").value||0;
const extcur=+tr.querySelector(".extcur").value||0;
const classint=+tr.querySelector(".classint").value||0;
const note=+tr.querySelector(".note").value||0;

const r=await fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
action:"save",
token:TOKEN,
className:document.getElementById("classSelect").value,
subject:activeStaff,
firstname:tr.querySelector(".h-fname").value,
lastname:tr.querySelector(".h-lname").value,
code:tr.querySelector(".h-code").value,
t1,t2,extcur,classint,note,
total:t1+t2+extcur+classint+note
})
});

const d=await r.json();
setRowStatus(tr,d.ok?"Saved":"Error",d.ok?"#2e7d32":"#d32f2f");
}

async function loadStudents(){

const cls=document.getElementById("classSelect").value;
const body=document.getElementById("studentTableBody");
body.innerHTML="";

const saved=await fetchExisting(cls);

(studentDatabase[cls]||[]).forEach(s=>{
body.appendChild(buildRow(s,saved[s.c]));
});
}

/* ================= PRINCIPAL ================= */

function loadPrincipalSelectors(){

const sel=document.getElementById("pClass");
Object.keys(studentDatabase).forEach(c=>{
const o=document.createElement("option");
o.value=c;o.textContent=c;
sel.appendChild(o);
});
}

async function loadPrincipal(){

const cls=document.getElementById("pClass").value;
const sub=document.getElementById("pSubject").value;

const r=await fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
action:"principal",
token:TOKEN,
className:cls,
subject:sub
})
});

const d=await r.json();

const body=document.getElementById("principalBody");
body.innerHTML="";

(d.records||[]).forEach(x=>{

const tr=document.createElement("tr");
if(Number(x.total)<20) tr.classList.add("low-score");

tr.innerHTML=`<td>${x.name}</td><td>${x.subject}</td><td>${x.total}</td>`;
body.appendChild(tr);

});
}
